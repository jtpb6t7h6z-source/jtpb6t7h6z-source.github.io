<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Final 30 Seconds 🏀 — Basketball Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #0f0a05;
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(150, 70, 10, 0.20) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 100%, rgba(100, 45, 5, 0.16) 0%, transparent 55%);
      color: #e0d0c0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== HEADER ===== */
    header {
      background-color: rgba(15, 10, 5, 0.95);
      border-bottom: 1px solid #3a1e0a;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: #ffffff;
      text-decoration: none;
    }
    header nav a {
      color: #c09060;
      text-decoration: none;
      font-size: 0.88rem;
      margin-left: 20px;
      transition: color 0.2s;
    }
    header nav a:hover { color: #ffffff; }

    /* ===== MAIN GAME AREA ===== */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 20px 60px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      color: #ffffff;
      text-align: center;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 0.95rem;
      color: #a09070;
      text-align: center;
      margin-bottom: 32px;
    }

    /* ===== STATUS BAR ===== */
    #status-bar {
      display: flex;
      gap: 24px;
      background: rgba(30, 15, 5, 0.7);
      border: 1px solid #3a1e0a;
      border-radius: 8px;
      padding: 14px 28px;
      margin-bottom: 28px;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      flex-wrap: wrap;
      justify-content: center;
    }
    .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .stat-label { font-size: 0.72rem; color: #806040; text-transform: uppercase; letter-spacing: 0.08em; }
    .stat-value { font-size: 1.1rem; color: #e09050; }

    /* ===== PROGRESS TRACK ===== */
    #progress-track {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
    }
    .progress-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: #3a1e0a;
      border: 1px solid #5a3010;
      transition: background-color 0.3s;
    }
    .progress-dot.active { background-color: #c85a00; }
    .progress-dot.done { background-color: #604030; }

    /* ===== SCENE CARD ===== */
    #scene-card {
      background: rgba(25, 12, 4, 0.8);
      border: 1px solid #3a1e0a;
      border-radius: 12px;
      padding: 36px 40px;
      max-width: 680px;
      width: 100%;
      margin-bottom: 24px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
    }

    #scene-icon {
      font-size: 2.4rem;
      text-align: center;
      margin-bottom: 16px;
    }

    #scene-text {
      font-size: 1.08rem;
      line-height: 1.75;
      color: #d8c8b8;
      text-align: center;
      margin-bottom: 28px;
    }

    /* ===== CHOICES ===== */
    #choices {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .choice-btn {
      background: rgba(40, 20, 5, 0.6);
      border: 1px solid #5a2e0a;
      border-radius: 8px;
      color: #e0c8a0;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      padding: 14px 20px;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s;
      line-height: 1.4;
    }
    .choice-btn:hover {
      background: rgba(200, 90, 0, 0.15);
      border-color: #c85a00;
      color: #ffffff;
    }
    .choice-btn .choice-label {
      display: inline-block;
      background: #c85a00;
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 2px 8px;
      border-radius: 3px;
      margin-right: 10px;
      vertical-align: middle;
    }

    /* ===== OUTCOME BOX ===== */
    #outcome-box {
      display: none;
      background: rgba(25, 12, 4, 0.8);
      border: 1px solid #3a1e0a;
      border-radius: 12px;
      padding: 36px 40px;
      max-width: 680px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
    }
    #outcome-box.win { border-color: #4a8a20; }
    #outcome-box.loss { border-color: #8a2020; }

    #outcome-icon { font-size: 3rem; margin-bottom: 14px; }
    #outcome-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      margin-bottom: 12px;
    }
    #outcome-box.win #outcome-title { color: #80c840; }
    #outcome-box.loss #outcome-title { color: #c84040; }
    #outcome-desc { font-size: 1rem; color: #b0a090; line-height: 1.6; margin-bottom: 24px; }

    #final-score {
      font-size: 0.88rem;
      color: #806040;
      margin-bottom: 24px;
    }
    #final-score span { color: #e09050; font-weight: 700; }

    #restart-btn {
      background-color: #c85a00;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      padding: 12px 32px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    #restart-btn:hover { background-color: #9a3a00; }

    /* ===== FOOTER ===== */
    footer {
      background-color: rgba(5, 3, 1, 0.9);
      border-top: 1px solid #3a1e0a;
      text-align: center;
      padding: 20px 16px;
      font-size: 0.82rem;
      color: #504030;
    }
  </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
  <a href="index.html" class="logo">Graham Hunter</a>
  <nav>
    <a href="scratch.html">← Basketball Page</a>
    <a href="index.html">Pro Site</a>
  </nav>
</header>

<!-- ===== MAIN ===== -->
<main>
  <h1>Final 30 Seconds 🏀</h1>
  <p class="subtitle">Down by 2. Half court. 30 seconds left. What do you do?</p>

  <!-- Status bar -->
  <div id="status-bar">
    <div class="stat"><span class="stat-label">Score</span><span class="stat-value" id="stat-score">0 pts</span></div>
    <div class="stat"><span class="stat-label">Confidence</span><span class="stat-value" id="stat-conf">50%</span></div>
    <div class="stat"><span class="stat-label">Clock</span><span class="stat-value" id="stat-clock">:30</span></div>
    <div class="stat"><span class="stat-label">Situation</span><span class="stat-value" id="stat-diff">Down 2</span></div>
  </div>

  <!-- Progress dots -->
  <div id="progress-track">
    <div class="progress-dot" id="dot-0"></div>
    <div class="progress-dot" id="dot-1"></div>
    <div class="progress-dot" id="dot-2"></div>
    <div class="progress-dot" id="dot-3"></div>
    <div class="progress-dot" id="dot-4"></div>
  </div>

  <!-- Scene card -->
  <div id="scene-card">
    <div id="scene-icon"></div>
    <p id="scene-text"></p>
    <div id="choices"></div>
  </div>

  <!-- Outcome box -->
  <div id="outcome-box">
    <div id="outcome-icon"></div>
    <div id="outcome-title"></div>
    <p id="outcome-desc"></p>
    <p id="final-score"></p>
    <button id="restart-btn" onclick="startGame()">Play Again</button>
  </div>
</main>

<!-- ===== FOOTER ===== -->
<footer>
  &copy; 2026 Graham Hunter &nbsp;·&nbsp; Final 30 Seconds Basketball Simulator
</footer>

<!-- ===== GAME LOGIC ===== -->
<script>
  /* ── Scene graph ── */
  const SCENES = {
    start: {
      icon: '🏀',
      text: "You catch the inbound pass at half court. Clock shows :30. Your team is down by 2 — you need at least a tie. The defense hasn't set yet.",
      choices: [
        { label: 'A', text: 'Push pace — attack before the defense can set up', next: 'push_pace', clock: 22, conf: +10 },
        { label: 'B', text: 'Call timeout — let your coach draw something up', next: 'timeout', clock: 20, conf: +5 },
        { label: 'C', text: 'Slow it down — get into the half court', next: 'halfcourt', clock: 18, conf: 0 },
      ]
    },

    push_pace: {
      icon: '⚡',
      text: "You're flying down the court. Two defenders scramble back. You hit the paint and see your options open up fast.",
      choices: [
        { label: 'A', text: 'Finish at the rim — draw contact, get to the line', next: 'finish_rim', clock: 16, conf: +15, score: +2 },
        { label: 'B', text: 'Kick out to the open corner shooter', next: 'kick_corner', clock: 14, conf: +5 },
        { label: 'C', text: 'Pull up for the mid-range off the glass', next: 'midrange_fast', clock: 15, conf: +5, score: +2 },
      ]
    },

    timeout: {
      icon: '📋',
      text: "Coach draws up a clean play in the huddle. The gym is loud. You walk back on the court calm — you know exactly what's coming.",
      choices: [
        { label: 'A', text: 'Run the pick-and-roll with your big man', next: 'pick_roll', clock: 14, conf: +10 },
        { label: 'B', text: 'Iso your best scorer on the wing', next: 'iso', clock: 14, conf: +5 },
        { label: 'C', text: 'Back-door cut for the easy layup', next: 'backdoor', clock: 14, conf: +15 },
      ]
    },

    halfcourt: {
      icon: '🧠',
      text: "You work the ball around the perimeter. :15 on the clock. Defense is locked in. You need to create something.",
      choices: [
        { label: 'A', text: 'Drive left — your stronger hand', next: 'drive_left', clock: 10, conf: +5 },
        { label: 'B', text: 'Step back three — fade away from the defender', next: 'stepback_three', clock: 8, conf: -5 },
        { label: 'C', text: 'Post up and work for the two', next: 'post_up', clock: 9, conf: 0 },
      ]
    },

    /* ── Terminal scenes ── */
    finish_rim: {
      icon: '🏆', terminal: true, win: true,
      title: 'And One!',
      desc: "You power through the contact, flip it off the glass, and it drops. The foul is called. You step to the line with :08 left, drain the free throw, and your team escapes with the win.",
      bonus: 1
    },
    kick_corner: {
      icon: '🏆', terminal: true, win: true,
      title: 'Corner Three — Good!',
      desc: "You feed the corner at exactly the right moment. Your teammate catches, sets, fires — nothing but net. A three-point swing. Game over.",
      bonus: 3
    },
    midrange_fast: {
      icon: '😬', terminal: true, win: false,
      title: 'Rim, Out.',
      desc: "The pull-up looked clean but caught the back of the rim and bounced out. They grab the board and run out the clock. Good effort, tough result.",
      bonus: 0
    },
    pick_roll: {
      icon: '🏆', terminal: true, win: true,
      title: 'Perfect Execution',
      desc: "The pick-and-roll unfolds exactly as drawn up. Your big slips the screen, catches the lob, and hammers it home. Tie game — and your team gets the stop in overtime.",
      bonus: 2
    },
    iso: {
      icon: '😬', terminal: true, win: false,
      title: 'Contested, Blocked',
      desc: "Your scorer goes one-on-one, gets a little greedy with the dribble, and the defender times the block perfectly. It's not your night.",
      bonus: 0
    },
    backdoor: {
      icon: '🏆', terminal: true, win: true,
      title: 'Backdoor Bucket!',
      desc: "The cutter reads the defense perfectly, slips behind the help, and catches the pass in stride for an easy layup. Textbook basketball.",
      bonus: 2
    },
    drive_left: {
      icon: '🏆', terminal: true, win: true,
      title: 'Tough Finish',
      desc: "You attack left, absorb the contact, and scoop it over the rim with your off hand. It rattles around and drops. The gym erupts.",
      bonus: 2
    },
    stepback_three: {
      icon: '😬', terminal: true, win: false,
      title: 'Airball',
      desc: "You take a step back on a tough three with a hand in your face. It sails wide left. You'll get them next time.",
      bonus: 0
    },
    post_up: {
      icon: '🏆', terminal: true, win: true,
      title: 'Drop Step, Two',
      desc: "You back your defender down, feel a gap on the left block, spin into a drop step, and lay it up off the glass. Tie game. Your defense holds in OT.",
      bonus: 2
    },
  };

  /* ── State ── */
  let step = 0;
  let score = 0;
  let confidence = 50;
  let clock = 30;

  /* ── DOM refs ── */
  const sceneIcon   = document.getElementById('scene-icon');
  const sceneText   = document.getElementById('scene-text');
  const choicesEl   = document.getElementById('choices');
  const sceneCard   = document.getElementById('scene-card');
  const outcomeBox  = document.getElementById('outcome-box');
  const statScore   = document.getElementById('stat-score');
  const statConf    = document.getElementById('stat-conf');
  const statClock   = document.getElementById('stat-clock');
  const statDiff    = document.getElementById('stat-diff');

  function updateStatus() {
    statScore.textContent = score + ' pts';
    statConf.textContent  = Math.max(0, Math.min(100, confidence)) + '%';
    statClock.textContent = ':' + String(clock).padStart(2, '0');
  }

  function updateDots(current) {
    for (let i = 0; i < 5; i++) {
      const dot = document.getElementById('dot-' + i);
      dot.className = 'progress-dot';
      if (i < current) dot.classList.add('done');
      else if (i === current) dot.classList.add('active');
    }
  }

  function renderScene(key) {
    const scene = SCENES[key];
    if (!scene) return;

    if (scene.terminal) {
      showOutcome(scene);
      return;
    }

    sceneIcon.textContent = scene.icon;
    sceneText.textContent = scene.text;
    choicesEl.innerHTML = '';

    scene.choices.forEach(ch => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.innerHTML = `<span class="choice-label">${ch.label}</span>${ch.text}`;
      btn.onclick = () => choose(ch);
      choicesEl.appendChild(btn);
    });

    updateDots(step);
  }

  function choose(ch) {
    if (ch.score)  score += ch.score;
    if (ch.conf)   confidence += ch.conf;
    if (ch.clock)  clock = ch.clock;
    step++;
    updateStatus();
    renderScene(ch.next);
  }

  function showOutcome(scene) {
    sceneCard.style.display = 'none';
    outcomeBox.style.display = 'block';
    outcomeBox.className = scene.win ? 'win' : 'loss';

    if (scene.bonus) score += scene.bonus;
    updateDots(5);

    document.getElementById('outcome-icon').textContent  = scene.icon;
    document.getElementById('outcome-title').textContent = scene.title;
    document.getElementById('outcome-desc').textContent  = scene.desc;
    document.getElementById('final-score').innerHTML =
      'Final score: <span>' + score + ' pts</span> &nbsp;·&nbsp; Confidence: <span>' + Math.max(0, Math.min(100, confidence)) + '%</span>';
    updateStatus();
  }

  function startGame() {
    step       = 0;
    score      = 0;
    confidence = 50;
    clock      = 30;
    updateStatus();
    updateDots(0);
    sceneCard.style.display   = 'block';
    outcomeBox.style.display  = 'none';
    outcomeBox.className      = '';
    statDiff.textContent      = 'Down 2';
    renderScene('start');
  }

  /* ── Boot ── */
  startGame();
</script>
</body>
</html>
